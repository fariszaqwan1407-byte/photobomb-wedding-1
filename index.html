<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Faris ❤️ Shafiqah Photobooth</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
overflow:hidden;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
box-sizing:border-box;
}

.active{display:flex;}

#camera{
width:100%;
height:100%;
object-fit:cover;
}

.btn{
background:linear-gradient(45deg,#d88ea0,#c77dff);
color:white;
padding:14px;
border:none;
border-radius:14px;
width:90%;
font-size:16px;
margin-top:10px;
box-shadow:0 0 15px rgba(216,142,160,0.4);
}

.input{
width:90%;
padding:12px;
margin:6px;
border-radius:10px;
border:none;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:20px;
border-radius:20px;
width:90%;
}

h1,h2,p{color:white;margin:5px;}

canvas{display:none;}
img{width:100%;border-radius:15px;margin-top:10px;}

/* LOADING */
#loading{
position:absolute;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
color:white;
flex-direction:column;
z-index:10;
}

/* FLOWERS */
.flower{
position:absolute;
top:-10%;
font-size:18px;
animation:fall linear infinite;
opacity:0.6;
}

@keyframes fall{
to{transform:translateY(120vh) rotate(360deg);}
}
</style>
</head>

<body>

<!-- WELCOME -->
<div class="screen active" id="welcome">
<h1>FARIS ❤️ SHAFIQAH</h1>
<p>Wedding Photobooth</p>
<button class="btn" onclick="startCamera()">MULA</button>
</div>

<!-- CAMERA -->
<div class="screen" id="cameraScreen">
<video id="camera" autoplay playsinline></video>

<button class="btn" onclick="capture()">AMBIL GAMBAR</button>
<button class="btn" onclick="switchCamera()">TUKAR KAMERA</button>
</div>

<!-- PREVIEW -->
<div class="screen" id="previewScreen">
<div class="card">
<img id="preview">
<input id="nama" class="input" placeholder="Nama anda">
<textarea id="ucapan" class="input" placeholder="Ucapan..." rows="3"></textarea>

<button class="btn" onclick="upload()">HANTAR</button>
<button class="btn" onclick="downloadImage()">DOWNLOAD</button>
</div>
</div>

<!-- DONE -->
<div class="screen" id="done">
<h2>❤️ TERIMA KASIH</h2>
<p>Gambar anda telah disimpan</p>
</div>

<!-- LOADING -->
<div id="loading">
<h2>Uploading Memory...</h2>
<p>Sila tunggu sebentar</p>
</div>

<canvas id="canvas"></canvas>

<script src="script.js"></script>

</body>
</html>
